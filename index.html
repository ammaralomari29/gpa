<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة المعدل الجامعي - جامعة اليرموك</title>
    <style>
        :root {
            --primary-color: #0f766e; /* لون مستوحى من الهوية الرسمية */
            --primary-hover: #115e59;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #0f172a;
            --border-color: #cbd5e1;
            --danger-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 30px 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        /* تنسيق اللوغو في المنتصف */
        .university-logo {
            max-width: 130px;
            height: auto;
            margin-bottom: 15px;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 24px;
            margin-bottom: 6px;
            font-weight: 800;
        }

        header p {
            color: #64748b;
            font-size: 14px;
        }

        .action-area {
            margin-bottom: 20px;
            display: flex;
            justify-content: flex-start;
        }

        .btn-add {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 4px 6px -1px rgba(15, 118, 110, 0.2);
        }

        .btn-add:hover {
            background-color: var(--primary-hover);
        }

        /* نظام الجدول والشريحة لتكون العناوين فوق الخانات مباشرة */
        .table-header {
            display: grid;
            grid-template-columns: 2.5fr 1fr 1fr 1fr 50px;
            gap: 15px;
            padding: 10px 15px;
            background: #e2e8f0;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            color: #334155;
            margin-bottom: 10px;
            text-align: center;
        }

        .subjects-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }

        .subject-row {
            display: grid;
            grid-template-columns: 2.5fr 1fr 1fr 1fr 50px;
            gap: 15px;
            align-items: center;
            background: #f8fafc;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        input {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            width: 100%;
            text-align: center;
        }

        /* محاذاة اسم المادة لليمين بدلاً من المنتصف لجمالية النصوص */
        input[type="text"] {
            text-align: right;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.1);
        }

        .grade-badge {
            text-align: center;
            font-weight: bold;
            font-size: 13px;
            padding: 10px 5px;
            border-radius: 6px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
        }

        .btn-delete {
            background: none;
            border: none;
            color: var(--danger-color);
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.2s;
            text-align: center;
        }

        .btn-delete:hover {
            transform: scale(1.15);
        }

        /* ألوان التقديرات */
        .grade-fail { background-color: #fee2e2; color: #ef4444; border-color: #fca5a5; }
        .grade-pass { background-color: #fef3c7; color: #d97706; border-color: #fde68a; }
        .grade-good { background-color: #e0f2fe; color: #0284c7; border-color: #bae6fd; }
        .grade-verygood { background-color: #e0e7ff; color: #4f46e5; border-color: #c7d2fe; }
        .grade-excellent { background-color: #dcfce7; color: #16a34a; border-color: #bbf7d0; }

        .results-panel {
            background: #f0fdfa;
            border: 2px dashed var(--primary-color);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-item {
            font-size: 18px;
            font-weight: bold;
            color: #115e59;
        }

        .result-item span {
            color: var(--primary-color);
            font-size: 24px;
            margin-right: 8px;
        }

        /* التوافق الكامل مع الهواتف الذكية */
        @media (max-width: 768px) {
            .table-header {
                display: none; /* إخفاء الهيدر الأفقي في الموبايل */
            }

            .subject-row {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
                padding: 15px;
                background: #f1f5f9;
                border-radius: 12px;
            }

            /* في الموبايل نعيد إظهار العناوين بشكل داخلي ذكي */
            .subject-row div::before {
                content: attr(data-label);
                display: block;
                font-size: 11px;
                font-weight: 700;
                color: #64748b;
                margin-bottom: 5px;
            }

            .subject-row .input-group-name {
                grid-column: span 2;
            }

            .btn-delete {
                grid-column: span 2;
                background: #fee2e2;
                padding: 8px;
                border-radius: 6px;
                font-size: 14px;
                font-weight: bold;
            }
            
            .results-panel {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e0/Yarmouk_University_Logo.png" alt="Yarmouk University Logo" class="university-logo">
        <h1>حاسبة المعدل الجامعي الذكية</h1>
        <p>نظام آمن ومشفر لحساب المعدل الفصلي والتراكمي لطلبة جامعة اليرموك</p>
    </header>

    <div class="action-area">
        <button class="btn-add" onclick="addSubjectRow()">+ إضافة مادة جديدة</button>
    </div>

    <div class="table-header">
        <div>اسم المادة</div>
        <div>عدد الساعات</div>
        <div>العلامة</div>
        <div>تقدير المادة</div>
        <div>حذف</div>
    </div>

    <div class="subjects-list" id="subjectsContainer">
        </div>

    <div class="results-panel">
        <div class="result-item">المعدل العام من 100:<span id="finalGPA">0.00</span></div>
        <div class="result-item">التقدير العام المكتسب:<span id="finalRating">-</span></div>
    </div>
</div>

<script>
    const container = document.getElementById('subjectsContainer');

    function getGradeDetails(score) {
        if (score === '' || isNaN(score)) return { text: '-', class: '' };
        if (score < 50) return { text: 'راسب', class: 'grade-fail' };
        if (score >= 50 && score < 68) return { text: 'مقبول', class: 'grade-pass' };
        if (score >= 68 && score < 76) return { text: 'جيد', class: 'grade-good' };
        if (score >= 76 && score < 84) return { text: 'جيد جداً', class: 'grade-verygood' };
        if (score >= 84 && score <= 100) return { text: 'امتياز', class: 'grade-excellent' };
        return { text: '-', class: '' };
    }

    function addSubjectRow() {
        const row = document.createElement('div');
        row.className = 'subject-row';
        
        // الأوسام المضافة هنا (data-label) مخصصة لترتيب العناوين تلقائياً إذا فُتح من الهاتف
        row.innerHTML = `
            <div class="input-group-name" data-label="اسم المادة">
                <input type="text" placeholder="مثال: مهارات حاسوب">
            </div>
            <div data-label="عدد الساعات">
                <input type="number" class="hours-input" min="1" placeholder="0" oninput="calculateTotalGPA()">
            </div>
            <div data-label="العلامة">
                <input type="number" class="score-input" min="0" max="100" placeholder="0" oninput="updateRowGrade(this); calculateTotalGPA()">
            </div>
            <div data-label="تقدير المادة">
                <div class="grade-badge">-</div>
            </div>
            <button class="btn-delete" title="حذف المادة" onclick="this.parentElement.remove(); calculateTotalGPA()">🗑️</button>
        `;
        
        container.appendChild(row);
    }

    function updateRowGrade(input) {
        const score = parseFloat(input.value);
        const badge = input.parentElement.parentElement.querySelector('.grade-badge');
        const details = getGradeDetails(score);
        
        badge.innerText = details.text;
        badge.className = 'grade-badge ' + details.class;
    }

    function calculateTotalGPA() {
        const rows = document.querySelectorAll('.subject-row');
        let totalPoints = 0;
        let totalHours = 0;

        rows.forEach(row => {
            const hoursInput = row.querySelector('.hours-input').value;
            const scoreInput = row.querySelector('.score-input').value;

            if (hoursInput && scoreInput && !isNaN(hoursInput) && !isNaN(scoreInput)) {
                const hours = parseFloat(hoursInput);
                const score = parseFloat(scoreInput);

                totalPoints += (score * hours);
                totalHours += hours;
            }
        });

        const finalGPAElement = document.getElementById('finalGPA');
        const finalRatingElement = document.getElementById('finalRating');

        if (totalHours > 0) {
            const finalGPA = totalPoints / totalHours;
            finalGPAElement.innerText = finalGPA.toFixed(2);
            const ratingDetails = getGradeDetails(finalGPA);
            finalRatingElement.innerText = ratingDetails.text;
        } else {
            finalGPAElement.innerText = '0.00';
            finalRatingElement.innerText = '-';
        }
    }

    // توليد الأربع خانات عند فتح الموقع تلقائياً
    window.onload = function() {
        for (let i = 0; i < 4; i++) {
            addSubjectRow();
        }
    };
</script>

</body>
</html>
