<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساب المعدل الجامعي</title>
    <style>
        :root {
            --primary-color: #0f766e;
            --primary-hover: #115e59;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-color: #0f172a;
            --border-color: #cbd5e1;
            --danger-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 30px 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 28px;
            margin-bottom: 8px;
            font-weight: 800;
        }

        header p {
            color: #64748b;
            font-size: 14px;
        }

        .action-area {
            margin-bottom: 20px;
            display: flex;
            justify-content: flex-start;
        }

        .btn-add {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            box-shadow: 0 4px 6px -1px rgba(15, 118, 110, 0.2);
        }

        .btn-add:hover {
            background-color: var(--primary-hover);
        }

        .table-header {
            display: grid;
            grid-template-columns: 2.5fr 1fr 1fr 1fr 50px;
            gap: 15px;
            padding: 10px 15px;
            background: #e2e8f0;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            color: #334155;
            margin-bottom: 10px;
            text-align: center;
        }

        .subjects-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 30px;
        }

        .subject-row {
            display: grid;
            grid-template-columns: 2.5fr 1fr 1fr 1fr 50px;
            gap: 15px;
            align-items: center;
            background: #f8fafc;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        input {
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            width: 100%;
            text-align: center;
        }

        input[type="text"] {
            text-align: right;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.1);
        }

        .grade-badge {
            text-align: center;
            font-weight: bold;
            font-size: 13px;
            padding: 10px 5px;
            border-radius: 6px;
